<!doctype html>
<html lang="vi">

<meta charset="utf-8">

<title>Dịch Máy Song Song · CVNSS4.0</title>
<style>
:root { --text:#0f172a; --muted:#64748b; --r:20px; }
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body {
  min-height:100vh; display:flex; flex-direction:column;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  color:var(--text); background:#f8fafc;
}
button,textarea { font:inherit; outline:none; }
button { border:0; cursor:pointer; }

.app { width:min(1600px,calc(100% - 24px)); margin:36px auto 0; flex:1; }

header { text-align:center; margin-bottom:28px; }
.badge {
  display:inline-flex; align-items:center; gap:8px;
  padding:6px 18px; border-radius:999px;
  background:#e2e8f0; color:#334155;
  font-weight:700; font-size:13px; letter-spacing:.5px; text-transform:uppercase;
}
.badge-dot { width:7px; height:7px; border-radius:50%; background:#22c55e; animation:blink 1.6s ease infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

.grid {
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:16px;
}
@media(max-width:1120px){ .grid{ grid-template-columns:repeat(2,minmax(0,1fr)); } }
@media(max-width:720px){ .grid{ grid-template-columns:1fr; gap:10px; } .app{ margin-top:16px; } }

.card {
  display:flex; flex-direction:column;
  border-radius:var(--r);
  border:1px solid rgba(0,0,0,.04);
  box-shadow:0 2px 8px rgba(0,0,0,.03);
  transition:transform .2s cubic-bezier(.16,1,.3,1),box-shadow .2s;
  overflow:hidden;
}
.card:focus-within { transform:translateY(-2px); box-shadow:0 10px 28px rgba(0,0,0,.07); }

.card-inner { display:flex; flex-direction:column; flex:1; padding:14px; }
.card-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.lang-name { font-size:14px; font-weight:700; color:#1e293b; }

.pill {
  font-size:11px; font-weight:700; text-transform:uppercase; padding:3px 8px;
  border-radius:6px; transition:.15s; letter-spacing:.3px;
}
.pill-idle  { opacity:0; }
.pill-busy  { opacity:1; color:#92400e; background:rgba(245,158,11,.18); animation:pulse .9s ease infinite alternate; }
.pill-ok    { opacity:1; color:#166534; background:rgba(34,197,94,.15); }
.pill-err   { opacity:1; color:#991b1b; background:rgba(239,68,68,.15); }
@keyframes pulse { to{opacity:.4} }

textarea {
  flex:1; width:100%; min-height:188px;
  padding:11px; resize:none;
  border:none; border-radius:12px;
  background:rgba(255,255,255,.4);
  line-height:1.65; font-size:15.5px; color:#0f172a;
  transition:background .15s;
}
textarea::placeholder { color:rgba(15,23,42,.28); }
textarea:focus { background:#fff; box-shadow:inset 0 0 0 1px rgba(0,0,0,.06); }

.card-foot {
  display:flex; align-items:center; justify-content:space-between;
  margin-top:10px; opacity:.55; transition:opacity .2s;
}
.card:hover .card-foot,.card:focus-within .card-foot { opacity:1; }
.char-count { font-size:12px; font-weight:600; color:#475569; }
.btn-copy {
  padding:5px 12px; border-radius:8px;
  background:rgba(255,255,255,.65); color:#334155;
  font-size:12px; font-weight:700; transition:.15s;
}
.btn-copy:hover { background:#fff; color:#000; }

.toast {
  position:fixed; left:50%; bottom:22px;
  transform:translateX(-50%) translateY(16px);
  opacity:0; pointer-events:none;
  padding:11px 22px; border-radius:999px;
  color:#fff; background:#0f172a;
  font-weight:600; font-size:13px;
  box-shadow:0 8px 24px rgba(0,0,0,.18);
  transition:.2s; z-index:99;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

footer { text-align:center; padding:38px 0; color:#94a3b8; font-size:13px; font-weight:500; }
</style>

  }catch(e){
    clearTimeout(t);
    if(e.name==="AbortError"||e.status<500) throw e;
    const c2=new AbortController();
    const t2=setTimeout(()=>c2.abort(),8000);
    try{
      const r2=await fetch(PROXY+encodeURIComponent(url),{...opts,signal:c2.signal});
      clearTimeout(t2);
      if(!r2.ok) throw new Error("ProxyFail");
      return r2.json();
    }catch{clearTimeout(t2);throw new Error("Net");}
  }
}

async function poll(hid, taskId){
  return new Promise((ok,fail)=>{
    let done=false, fired=0;
    // Schedule: 80ms×6, 180ms×8, 380ms×10, 850ms×10
    const S=[...Array(6).fill(80),...Array(8).fill(180),...Array(10).fill(380),...Array(10).fill(850)];
    let acc=0;
    S.forEach((d,i)=>{
      acc+=d;
      const my=acc;
      setTimeout(async()=>{
        if(done)return;
        fired++;
        const url=\`\${API}/translation-history/get-single?translationHistoryId=\${hid}&taskId=\${taskId}&_t=\${my}\`;
        try{
          const s=await req(url,{method:"GET"},5000);
          if(done)return;
          const st=String(s?.data?.status||"").toLowerCase();
          if(st==="translated"&&s?.data?.resultUrl){done=true;ok(s.data.resultUrl);}
          else if(["failed","error"].includes(st)){done=true;fail(new Error("AI"));}
          else if(fired>=S.length){done=true;fail(new Error("Timeout"));}
        }catch{if(++fired>=S.length&&!done){done=true;fail(new Error("Net"));}}
      },acc);
    });
    setTimeout(()=>{if(!done){done=true;fail(new Error("HardTimeout"));}},28000);
  });
}

async function translate(src,sL,tL){
  if(sL===tL)return src;
  const s=src.trim();
  if(!s)return "";
  const k=sL+"|"+tL+"|"+s;
  if(L1.has(k))return L1.get(k);
  const init=await req(API+"/translate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({sourceText:s,sourceLang:sL,targetLang:tL})});
  if(!init?.data?.taskId)throw new Error("NoTask");
  const hid=init.data.translationHitoryId||init.data.translationHistoryId;
  const rUrl=await poll(hid,init.data.taskId);
  const outUrl=API+"/"+rUrl.replace(/^\\/+/,"")+"?_t="+Date.now();
  const out=await req(outUrl,{method:"GET"});
  const text=String(out?.target_text??out?.targetText??out?.data?.target_text??"").trim();
  if(text){L1.set(k,text);self.postMessage({type:"cache",key:k,val:text});}
  return text;
}

self.onmessage=async e=>{
  if(e.data.type==="warmup"){e.data.entries.forEach(([k,v])=>L1.set(k,v));return;}
  const{id,src,sL,tL}=e.data;
  try{const res=await translate(src,sL,tL);self.postMessage({id,ok:true,res});}
  catch{self.postMessage({id,ok:false});}
};
`;

/* ══════════════════════════════════════════════════
   Worker Pool — 1 worker riêng cho mỗi ngôn ngữ đích
   ══════════════════════════════════════════════════ */
const L2_KEY = "dichsongsong_v3";
let l2 = {};
try { l2 = JSON.parse(localStorage.getItem(L2_KEY) || "{}"); } catch {}

const WKS = {}; // { en: Worker, zh: Worker, lo: Worker, km: Worker }
const CBS = new Map();
const WLANGS = ["en","zh","lo","km"];

const wkBlob = URL.createObjectURL(new Blob([WK],{type:"application/javascript"}));

WLANGS.forEach(lang => {
  const w = new Worker(wkBlob);
  WKS[lang] = w;
  const warm = Object.entries(l2).filter(([k]) => k.includes("|"+lang+"|"));
  if (warm.length) w.postMessage({ type:"warmup", entries:warm });
  w.onmessage = e => {
    if (e.data.type === "cache") {
      l2[e.data.key] = e.data.val;
      try { localStorage.setItem(L2_KEY, JSON.stringify(l2)); } catch {}
      return;
    }
    const cb = CBS.get(e.data.id);
    if (cb) { cb(e.data); CBS.delete(e.data.id); }
  };
});

function dispatch(src, sL, tL) {
  return new Promise(res => {
    const id = Math.random().toString(36).slice(2);
    CBS.set(id, res);
    (WKS[tL] || WKS[WLANGS[0]]).postMessage({ id, src, sL, tL });
  });
}

/* ══════════════════════════════════════════════════
   UI
   ══════════════════════════════════════════════════ */
const LANGS = [
  { id:"vi",    label:"Tiếng Việt", bg:"#fee2e2", ph:"Nhập văn bản Việt…"   },
  { id:"cvnss", label:"CVNSS4.0",   bg:"#e0f2fe", ph:"Nhập CVNSS4.0…"       },
  { id:"en",    label:"English",    bg:"#ccfbf1", ph:"Type here…"            },
  { id:"zh",    label:"中文",        bg:"#fef3c7", ph:"输入文本…"              },
  { id:"lo",    label:"ພາສາລາວ",    bg:"#dcfce7", ph:"ພິມຢູ່ທີ່ນີ້…"         },
  { id:"km",    label:"ភាសាខ្មែរ",  bg:"#f3e8ff", ph:"វាយអត្ថបទ…"           }
];

const grid = document.getElementById("grid");
const TX = {}, ST = {}, CC = {};
let active = "vi", runId = 0;
let debTimer, lastKey = 0;

// Build UI
grid.innerHTML = LANGS.map(l => `
  <div class="card" style="background:${l.bg}">
    <div class="card-inner">
      <div class="card-top">
        <span class="lang-name">${l.label}</span>
        <span class="pill pill-idle" id="st-${l.id}"></span>
      </div>
      <textarea id="tx-${l.id}" spellcheck="false" placeholder="${l.ph}"></textarea>
      <div class="card-foot">
        <span class="char-count" id="cc-${l.id}">0 ký tự</span>
        <button class="btn-copy" onclick="cp('${l.id}')">Sao chép</button>
      </div>
    </div>
  </div>
`).join("");

LANGS.forEach(l => {
  TX[l.id] = document.getElementById(`tx-${l.id}`);
  ST[l.id] = document.getElementById(`st-${l.id}`);
  CC[l.id] = document.getElementById(`cc-${l.id}`);

  TX[l.id].addEventListener("input", e => {
    CC[l.id].textContent = e.target.value.length + " ký tự";
    active = l.id;
    clearTimeout(debTimer);
    if (!e.target.value.trim()) {
      runId++;
      LANGS.filter(x => x.id !== active).forEach(x => {
        TX[x.id].value = ""; CC[x.id].textContent = "0 ký tự"; badge(x.id,"");
      });
      return;
    }
    // Adaptive debounce
    const now = Date.now(), gap = now - lastKey;
    lastKey = now;
    debTimer = setTimeout(() => sync(active, TX[active].value.trim()), gap > 500 ? 60 : 200);
  });
});

function badge(id, type) {
  const el = ST[id];
  el.className = "pill pill-" + (type || "idle");
  el.textContent = type === "busy" ? "Đang dịch…" : type === "ok" ? "Xong" : type === "err" ? "Lỗi" : "";
  if (type === "ok") setTimeout(() => { if (el.className.includes("ok")) { el.className = "pill pill-idle"; el.textContent = ""; }}, 1800);
}

async function sync(src, text) {
  const rid = ++runId;
  const targets = LANGS.filter(l => l.id !== src);
  targets.forEach(t => badge(t.id,"busy"));

  // Phase 1: pivot → tiếng Việt
  let vi = text;
  if (src === "cvnss") {
    vi = CVNSSConverter.toVI(text);
  } else if (src !== "vi") {
    try {
      const r = await dispatch(text, src, "vi");
      if (rid !== runId) return;
      if (!r.ok) throw 1;
      vi = r.res;
    } catch {
      if (rid !== runId) return;
      targets.forEach(t => badge(t.id,"err"));
      return;
    }
  }

  // Phase 2: vi → tất cả đích song song (không đợi nhau)
  targets.forEach(async t => {
    try {
      let out = "";
      if (t.id === "vi") out = vi;
      else if (t.id === "cvnss") out = CVNSSConverter.toCVN(vi);
      else {
        const r = await dispatch(vi, "vi", t.id);
        if (!r.ok) throw 1;
        out = r.res;
      }
      if (rid !== runId) return;
      TX[t.id].value = out;
      CC[t.id].textContent = out.length + " ký tự";
      badge(t.id,"ok");
    } catch {
      if (rid !== runId) return;
      badge(t.id,"err");
    }
  });
}

function cp(id) {
  const v = TX[id].value; if (!v) return;
  navigator.clipboard.writeText(v).catch(() => { TX[id].select(); document.execCommand("copy"); });
  const t = document.getElementById("toast");
  t.textContent = "Đã sao chép!"; t.classList.add("show");
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove("show"), 1400);
}
